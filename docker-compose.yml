version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: ba-agent-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ba-network

  # PostgreSQL for session storage
  postgres:
    image: postgres:15
    container_name: ba-agent-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=agent_state
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=agent123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ba-network

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: ba-agent-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ba-network

  # Ollama LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: ba-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    command: serve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ba-network

networks:
  ba-network:
    driver: bridge

volumes:
  neo4j_data:
  postgres_data:
  chroma_data:
  ollama_data:
