services:
  - type: web
    name: ba-agent-backend
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
